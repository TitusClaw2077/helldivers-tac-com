; Helldivers Tac-Com Bracelet — PlatformIO monorepo
; Two build targets: wrist (Elecrow CrowPanel ESP32 3.5") and launcher (ESP32-WROOM-32)

[platformio]
default_envs = wrist

[env:wrist]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = +<src/wrist/> -<src/launcher/>
lib_deps =
    lvgl/lvgl @ ^9
    ; TFT_eSPI or Elecrow-specific display driver — add once board is in hand
build_flags =
    -D TACCOM_WRIST
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
monitor_speed = 115200

[env:launcher]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = +<src/launcher/> -<src/wrist/>
build_flags =
    -D TACCOM_LAUNCHER
    -I include
monitor_speed = 115200
