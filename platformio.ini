; Helldivers Tac-Com Bracelet — PlatformIO monorepo
; Two build targets: wrist (Elecrow CrowPanel ESP32 3.5") and launcher (ESP32-WROOM-32)

[platformio]
default_envs = wrist

[env:wrist]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = +<wrist/> +<common/> -<launcher/>
; LVGL/display deps will be added back when the wrist UI is wired up
build_flags =
    -D TACCOM_WRIST
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
    -I include/common
monitor_speed = 115200

[env:launcher]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = +<launcher/> +<common/> -<wrist/>
build_flags =
    -D TACCOM_LAUNCHER
    -I include
    -I include/common
monitor_speed = 115200
